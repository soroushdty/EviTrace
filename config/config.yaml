# OpenAI API Configuration
openai:
  # API key: will read from OPENAI_API_KEY environment variable if not set here
  api_key: "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" # Uncomment and set if not using environment variable

  # Base URL: will read from OPENAI_BASE_URL environment variable if not set here
  # Default OpenAI API base URL. Leave empty to rely on environment override.
  base_url: "https://api.openai.com/v1"

  # Model choices
  chunk_model: "gpt-5.5"
  synthesis_model: "gpt-5.5"

  # Temperature parameter (leave empty to omit from API requests)
  # Some newer OpenAI models reject the temperature parameter entirely
  temperature: null

  # Prompt cache configuration
  prompt_cache:
    key_prefix: "scoping-review-v1"
    retention: "24h" # e.g., "24h", "in_memory"
    enable_prewarm: true
    warmup_max_tokens: 32
    prewarm_synthesis_if_model_diff: true

# Extraction and chunking configuration
extraction:
  # Number of extraction chunks
  # Chunk 1-N: extraction, Chunk N+1: synthesis/review
  num_chunks: 3
  max_evidence_items_per_chunk: 250
  max_evidence_chars_per_chunk: 60000
  evidence_cache_dir: "outputs/evidence_cache"

# Concurrency settings
concurrency:
  pdf_processing: 1 # PDFs processed in parallel
  global_api_limit: 15 # Max concurrent OpenAI API calls across all PDFs

# Retry configuration
retry:
  max_retries: 3
  base_delay_seconds: 5 # Actual delay = base * 2^(attempt - 1)

# Paths
pdfs_path: "input"
output_folder_path: "outputs"
extraction_map_path: "extraction_map.json"

# Logging configuration
log_file: "run.log"
log_level: "DEBUG"

# Extraction and OCR settings
len_filter: 40
ocr: false

# Text processor configuration
# class: fully-qualified class path resolved via importlib
#   valid values: "utils.text_processor.TextProcessor" (default) or any SentenceSegment subclass path
text_processor:
  class: "utils.text_processor.TextProcessor"
  # sentence_tokenizer.backend: "scispacy" (default) | "wtpsplit" | "nltk_punkt" | "spacy_sentencizer" | "stanza"
  sentence_tokenizer:
    backend: "scispacy"
    model: "en_core_sci_sm"
  # word_tokenizer.backend: "simple" (default) | "spacy" | "nltk"
  word_tokenizer:
    backend: "spacy"
  # normalizer.backend: "nfc" | "nfkc" (default)
  normalizer:
    backend: "nfkc"
  comparison:
    metric: "levenshtein" # only supported metric
    threshold: 0.85 # float 0.0–1.0; texts above this ratio are considered similar
  ocr_cleaning:
    weird_char_threshold: 0.05 # float 0.0–1.0; fraction of weird chars triggering clean_ocr

# Quality control pipeline configuration
quality_control:
  discard_failed_branches: false
  status_field_location: "both"
  # GROBID extractor settings
  grobid:
    auto_start: true
    docker_image: "lfoppiano/grobid:0.8.0"
    url: "http://localhost:8070"
    timeout: 180
    consolidate_header: 0
    consolidate_citations: 0
    generate_ids: true
    segment_sentences: true
    include_raw_citations: true
    include_raw_affiliations: false
    tei_coordinates: true
    max_retries: 2
  grobid_integration:
    enabled: true
    failure_behavior: "manifest_fail" # fallback | manifest_fail
    crop_figures: true
    crop_tables: true
  addons:
    grobid_quantities:
      enabled: false
      url: ""
      endpoint: "/service/process"
      timeout: 60
    datastet:
      enabled: false
      url: ""
      endpoint: "/service/processDataseerSentence"
      timeout: 60
    entity_fishing:
      enabled: false
      url: ""
      endpoint: "/service/disambiguate"
      timeout: 60
  # Semantic quality scoring
  semantic_qc:
    enabled: false
    model_name: "BAAI/bge-base-en-v1.5"
    query_prefix: "Represent this sentence for searching relevant passages: "
    similarity_threshold: 0.85
    max_sentences: 10000
  # Local heuristic quality metrics
  local_metrics:
    min_chars_per_page: 100
    grobid_vs_native_ratio_threshold: 0.6
    long_sentence_word_threshold: 120
    long_sentence_max_fraction: 0.12
    expected_sections: ["abstract", "introduction", "methods", "results"]
    caption_table_figure_check_enabled: true
    coordinate_coverage_threshold: 0.1
    references_in_body_threshold: 0.05
    weird_char_ratio_threshold: 0.05
  # QC pipeline stage configuration
  artifact_generator:
    export_to_disk: true
    output_dir: "output/qc_artifacts"
  rater:
    attributes: []
  iaa_calculator:
    thresholds: {}
    agreement_metrics: []
  adjudicator:
    strategy: "placeholder"
  reconciler:
    enable_tei_export: false
    enable_annotation_export: false
  # Per-page scan detection thresholds (Requirement 9 / design §scan_detector)
  # text_density_threshold: minimum word count for a page to be classified as native (integer, >= 0)
  # alpha_ratio_threshold: minimum fraction of alphabetic characters in cleaned text (float, 0.0-1.0)
  # image_dominance_threshold: max image-area fraction before page is flagged as scanned (float, 0.0-1.0)
  scan_detection:
    text_density_threshold: 50
    alpha_ratio_threshold: 0.60
    image_dominance_threshold: 0.85
  # OCR rasterization settings (Requirement 9)
  # rasterization_dpi: DPI used when rasterizing a page for PaddleOCR (integer; e.g. 150 | 300)
  ocr:
    rasterization_dpi: 150
  # Text fidelity concern settings (Requirement 9)
  # edit_distance_threshold: normalized Levenshtein distance above which texts are "divergent" (float, 0.0-1.0)
  text_fidelity:
    edit_distance_threshold: 0.10
  # Section verification concern settings (Requirement 9)
  # font_size_tolerance: allowable font-size delta (in points) when verifying section headings (float)
  section_verification:
    font_size_tolerance: 1.0
