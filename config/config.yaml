# OpenAI API Configuration
openai:
  # API key: will read from OPENAI_API_KEY environment variable if not set here
  api_key: "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" # Uncomment and set if not using environment variable

  # Base URL: will read from OPENAI_BASE_URL environment variable if not set here
  # Default OpenAI API base URL. Leave empty to rely on environment override.
  base_url: "https://api.openai.com/v1"

  # Model choices
  chunk_model: "gpt-5.5"
  synthesis_model: "gpt-5.5"

  # Temperature parameter (leave empty to omit from API requests)
  # Some newer OpenAI models reject the temperature parameter entirely
  temperature: null

  # Prompt cache configuration
  prompt_cache:
    key_prefix: "scoping-review-v1"
    retention: "24h" # e.g., "24h", "in_memory"
    enable_prewarm: true
    warmup_max_tokens: 32
    prewarm_synthesis_if_model_diff: true

# Extraction and chunking configuration
extraction:
  # Number of extraction chunks
  # Chunk 1-N: extraction, Chunk N+1: synthesis/review
  num_chunks: 3

# Concurrency settings
concurrency:
  pdf_processing: 1 # PDFs processed in parallel
  global_api_limit: 15 # Max concurrent OpenAI API calls across all PDFs

# Retry configuration
retry:
  max_retries: 3
  base_delay_seconds: 5 # Actual delay = base * 2^(attempt - 1)

# Paths
pdfs_path: "pdfs"
output_folder_path: "output"
extraction_map_path: "extraction_map.json"

# Logging configuration
log_file: "log.txt"
log_level: "DEBUG"

# Extraction and OCR settings
len_filter: 40
ocr: true
ocr_text_quality_threshold: 0.7
