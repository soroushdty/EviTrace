# OpenAI API Configuration
openai:
  # API key: will read from OPENAI_API_KEY environment variable if not set here
  api_key: "" # Set OPENAI_API_KEY environment variable

  # Base URL: will read from OPENAI_BASE_URL environment variable if not set here
  # Default OpenAI API base URL. Leave empty to rely on environment override.
  base_url: "https://api.openai.com/v1"

  # Model choices
  chunk_model: "gpt-5.5"
  synthesis_model: "gpt-5.5"

  # Temperature parameter (leave empty to omit from API requests)
  # Some newer OpenAI models reject the temperature parameter entirely
  temperature: null

  # Prompt cache configuration
  prompt_cache:
    key_prefix: "scoping-review-v1"
    retention: "24h" # e.g., "24h", "in_memory"
    enable_prewarm: true
    warmup_max_tokens: 32
    # When true, fire an extra synthesis-shaped warmup (shared_prefix +
    # extraction_map for the synthesis chunk) in parallel with the
    # extraction chunks. This preserves the extraction-map prefix on the
    # server cache for the synthesis call; prior_context is a data-
    # dependent trailing suffix that cannot be cached. Saves input tokens
    # on the synthesis chunk even when chunk_model == synthesis_model.
    prewarm_synthesis_if_model_diff: true

# Extraction and chunking configuration
extraction:
  # Number of extraction chunks
  # Chunk 1-N: extraction, Chunk N+1: synthesis/review
  num_chunks: 5
  # Evidence budgets per chunk. Defaults tuned so the ranker actually prunes
  # (old defaults of 250/60000 were larger than every real paper's evidence
  # set, so nothing was filtered and we were paying to tokenize the full
  # corpus three times). 150 items / 30000 chars covers ~99% of scientific
  # papers in the reference corpus without dropping high-signal sentences.
  # Raise these if your downstream QC reports missing evidence; lower them
  # to save more input tokens.
  max_evidence_items_per_chunk: 150
  max_evidence_chars_per_chunk: 10000
  evidence_cache_dir: "evidence_cache"

# Concurrency settings
concurrency:
  # PDFs processed in parallel. 3 is a safe default: GROBID extraction is
  # almost entirely network-wait on the client side, so overlapping PDF N's
  # GROBID call with PDF N-1's LLM calls is close to free. global_api_limit
  # below caps concurrent OpenAI calls so this never overwhelms the API.
  pdf_processing: 1
  global_api_limit: 15 # Max concurrent OpenAI API calls across all PDFs

# Retry configuration
retry:
  max_retries: 3
  # Base delay in seconds for exponential backoff on non-429 errors.
  # Actual delay = base * 2^(attempt - 1), capped at 30s. When the server
  # sends a Retry-After header (standard for 429 and some 503), the client
  # honors it verbatim instead of using the exponential schedule.
  base_delay_seconds: 1
  # Maximum number of characters to include in model-response log previews.
  # Responses longer than this are truncated in WARNING-level log messages;
  # the full SHA-256 hash is always included for correlation with debug
  # artifacts. Respected by all model-response log statements.
  max_log_response_chars: 500

# Paths
pdfs_path: "input"
main_output_dir: "outputs"
extraction_map_path: "configs/extraction_map.json"

# Logging configuration
log_file: "run.log"
# Console level. File handler is always DEBUG (full detail on disk); the
# console only shows INFO+ by default to keep the terminal readable on
# long batch runs. Set to "DEBUG" when debugging a pipeline issue.
log_level: "DEBUG"

# CSV export configuration
# When true, the pipeline writes one combined CSV from all extracted JSONs
# at the end of the run. The --export-csv CLI flag still overrides this.
export_csv: true

# Extracted value sanitization
# When true, sanitize extracted_value fields using the configured normalizer.
# This ensures the canonical JSON has clean values.
sanitize_extracted_values: true
# Normalizer class to apply. Choose from:
#   - OULNormalizer: OcrCleaner → UnicodeNormalizer(NFKC) → LineHealingNormalizer (default)
#   - AggressiveNormalizer: strips non-word chars, collapses whitespace, lowercases
#   - WhitespaceNormalizer: collapses whitespace, lowercases
#   - OcrCleaner: strips C0 control chars only
#   - UnicodeNormalizer: Unicode normalization (NFC/NFKC)
#   - LineHealingNormalizer: heals PDF line breaks, collapses whitespace
exported_value_normalizer: "OULNormalizer"

# Extraction and OCR settings
len_filter: 40
ocr: false

# Text processor configuration
# class: fully-qualified class path resolved via importlib
#   Must implement all six TextProcessor methods (normalize, tokenize_words,
#   tokenize_sentences, clean_ocr, compare, extract_keywords). The composite
#   DefaultTextProcessor fulfils this contract; single-purpose SentenceSegment
#   backends (e.g. ScispaCySentenceSegment) do NOT and will crash the pipeline
#   in scan_detector / reconciler stages.
text_processor:
  class: "text_processing.composite.DefaultTextProcessor"
  # sentence_tokenizer.backend: "scispacy" | "wtpsplit" | "nltk_punkt" (default) | "spacy_sentencizer" | "stanza"
  sentence_tokenizer:
    backend: "scispacy"
    model: "en_core_sci_sm"
  # word_tokenizer.backend: "simple" (default) | "spacy" | "nltk"
  word_tokenizer:
    backend: "spacy"
  # normalizer.backend: "nfc" | "nfkc" (default)
  normalizer:
    backend: "nfkc"
  comparison:
    metric: "levenshtein" # only supported metric
    threshold: 0.85 # float 0.0–1.0; texts above this ratio are considered similar
  ocr_cleaning:
    weird_char_threshold: 0.05 # float 0.0–1.0; fraction of weird chars triggering clean_ocr

# Quality control pipeline configuration
quality_control:
  discard_failed_branches: false
  status_field_location: "both"
  # GROBID extractor settings
  grobid:
    auto_start: true
    # Use the CRF-only image by default: 5-10x faster startup and per-request
    # latency than the full DL image, with equivalent accuracy on Western-
    # language scientific PDFs for the TEI fields EviTrace consumes (title,
    # authors, sections, sentences, citations, coordinates).
    docker_image: "lfoppiano/grobid:0.8.2-crf"
    # Tuning knobs applied at container launch by GrobidServerManager.
    # - java_opts: JVM heap + GC tuning; 4G is a reasonable default for a
    #   single-worker local container on an 8-core/16GB machine.
    # - concurrency: max number of parallel GROBID requests handled by the
    #   container; matches the worker pool size reserved by GROBID.
    # - cpus: optional docker --cpus limit. Leave empty to let the container
    #   use all available CPUs (recommended).
    # -Xms512m allows the JVM to start without pre-allocating 2g of heap
    # upfront (important on no-swap systems and Docker with memory limits).
    # -Xmx4g caps a runaway extraction.
    java_opts: "-Xms512m -Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
    concurrency: 4
    cpus: ""
    url: "http://127.0.0.1:8070"
    # When false (default), the container is left running between EviTrace
    # invocations so the next run reuses its warm JVM + CRF models (~70s
    # saved per run). Pass --tear-down-grobid on the CLI, set
    # EVI_GROBID_STOP_ON_EXIT=1, or flip this to true for CI teardown.
    container_name: "evi-grobid"
    stop_on_exit: false
    # Per-request timeout for /api/processFulltextDocument.
    # Lowered to 300s so stalled PDFs fail faster and free the batch.
    timeout: 300
    # Warmup strategy after GROBID becomes reachable. Choose one of:
    # - disabled: skip warmup entirely
    # - synthetic_minimal_pdf: legacy 1-page empty PDF (may be rejected)
    # - tiny_real_pdf: generated 1-page PDF with visible text (default)
    warmup:
      enabled: true
      mode: "tiny_real_pdf"
      timeout: 300
      title: "EviTrace warmup"
      text: "Warmup document for GROBID model loading."
    # Content-addressed disk cache for GROBID TEI XML responses.
    # Keyed by PDF SHA-256 — safe across renames, reruns, and interrupted runs.
    # Delete the directory to force GROBID re-extraction. Set to "" to disable.
    tei_cache_dir: "grobid_tei_cache"
    consolidate_header: 0
    consolidate_citations: 0
    generate_ids: false
    segment_sentences: true
    include_raw_citations: true
    include_raw_affiliations: false
    tei_coordinates: true
    max_retries: 2
  grobid_integration:
    enabled: true
    failure_behavior: "manifest_fail" # fallback | manifest_fail
    crop_figures: true
    crop_tables: true
  addons:
    # All three services produce accuracy-positive enrichment (quantities,
    # datasets, entities). Kept enabled, but each request is now gated by a
    # fast /service/isalive preflight probe so a down service adds ~2s (not
    # ~60s) to the cache-miss path, and each returned annotation is mapped
    # back to the specific evidence item whose text contains its offset --
    # not blasted onto every item.
    grobid_quantities:
      enabled: true
      url: "http://localhost:8060"
      endpoint: "/service/processQuantityText"
      isalive: "/service/isalive"
      timeout: 5
      preflight_timeout: 2
    datastet:
      enabled: true
      url: "http://localhost:8080"
      endpoint: "/service/processDataseerText"
      isalive: "/service/isalive"
      timeout: 5
      preflight_timeout: 2
    entity_fishing:
      enabled: true
      url: "http://localhost:8090"
      endpoint: "/service/disambiguate"
      isalive: "/service/isalive"
      timeout: 5
      preflight_timeout: 2
  # Source text presence verification
  source_text_verification:
    enabled: true
  # Semantic source verification (scaffolded; disabled by default)
  semantic_verification:
    enabled: false
    model_name: "BAAI/bge-base-en-v1.5"
    query_prefix: "Represent this sentence for searching relevant passages: "
    similarity_threshold: 0.85
    max_sentences: 10000
    on_index_unavailable: "skip"
    extractor_agreement:
      enabled: false
      len_filter: 40
      max_examples: 10
  # Task quality scaffold (placeholder metrics; enabled by default)
  task_quality_scaffold:
    enabled: false
  # Local heuristic quality metrics
  local_metrics:
    min_chars_per_page: 100
    extraction_coverage_ratio_threshold: 0.6
    long_sentence_word_threshold: 120
    long_sentence_max_fraction: 0.12
    expected_sections:
      [
        "abstract",
        "introduction",
        "methods",
        "results",
        "discussion",
        "conclusion",
      ]
    caption_table_figure_check_enabled: true
    coordinate_coverage_threshold: 0.1
    references_in_body_threshold: 0.05
    weird_char_ratio_threshold: 0.05
  # QC pipeline stage configuration
  artifact_generator:
    export_to_disk: true
    output_dir: "output/qc_artifacts"
  reconciler:
    enable_tei_export: false
    enable_annotation_export: false
  scan_detection:
    text_density_threshold: 50 # min word count for a page to be classified as native (int, >= 0)
    alpha_ratio_threshold: 0.60 # min fraction of alphabetic chars in cleaned text (float, 0.0–1.0)
    image_dominance_threshold: 0.85 # max image-area fraction before page is flagged as scanned (float, 0.0–1.0)
  ocr:
    rasterization_dpi: 150 # DPI used when rasterizing a page for PaddleOCR (int; e.g. 150 | 300)
  text_fidelity:
    edit_distance_threshold: 0.10 # normalized Levenshtein distance above which texts are "divergent" (float, 0.0–1.0)
  section_verification:
    font_size_tolerance: 1.0 # allowable font-size delta (in points) when verifying section headings
